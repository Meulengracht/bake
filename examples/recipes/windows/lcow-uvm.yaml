project:
  name: lcow-uvm
  summary: LCOW utility VM assets
  description: |
    Builds an LCOW UVM bundle (uvm.vhdx + optional kernel/initrd/boot params)
    using hcsshim + LinuxKit as an offline asset-production step. The
    normalized output is suitable for `mkuvm`,
    `cvctl uvm import`, `cvctl uvm import-pack`, and future package-based delivery.
  author: Philip Meulengracht
  email: the_meulengracht@hotmail.com
  version: 1.0.0
  license: MIT

environment:
  host:
    packages:
      - git
      - linuxkit

recipes:
  - name: uvm
    source:
      type: path
      path: ./
      script: |
        if build.subsystem.platform_host() == "linux" then
          args = build.paths.install()
          args = args .. " " .. build.subsystem.arch_target()
          build.shell("construct-lcow-uvm.sh", args)
        end

packs:
- name: lcow-uvm
  type: os
